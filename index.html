<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meme Generator - Crie Memes Online</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1>Meme Generator</h1>
            <p>O Melhor Gerador de Memes Online</p>
        </div>
    </header>

    <div class="main-wrapper">
        <!-- SIDEBAR ESQUERDO: TEMPLATES -->
        <aside class="sidebar-left">
            <h2>Escolha um Template</h2>
            <div class="template-grid">
                <div class="template-item" data-url="https://i.imgflip.com/1bij.jpg">
                    <img src="https://i.imgflip.com/1bij.jpg" alt="One Does Not Simply">
                </div>
                <div class="template-item" data-url="https://i.imgflip.com/26am.jpg">
                    <img src="https://i.imgflip.com/26am.jpg" alt="Grumpy Cat">
                </div>
                <div class="template-item" data-url="https://i.imgflip.com/1ur9b0.jpg">
                    <img src="https://i.imgflip.com/1ur9b0.jpg" alt="Distracted Boyfriend">
                </div>
                <div class="template-item" data-url="https://i.imgflip.com/2wifvo.jpg">
                    <img src="https://i.imgflip.com/2wifvo.jpg" alt="Drake">
                </div>
                <div class="template-item" data-url="https://i.imgflip.com/335p7u.jpg">
                    <img src="https://i.imgflip.com/335p7u.jpg" alt="Woman Yelling at Cat">
                </div>
                <div class="template-item" data-url="https://i.imgflip.com/261o3a.jpg">
                    <img src="https://i.imgflip.com/261o3a.jpg" alt="Two Buttons">
                </div>
            </div>

            <div class="upload-section">
                <h3>Ou Envie sua Imagem</h3>
                <label for="imageUpload" class="upload-btn">
                    Escolher Arquivo
                    <input type="file" id="imageUpload" accept="image/*">
                </label>
            </div>
        </aside>

        <!-- CANVAS CENTRAL -->
        <main class="canvas-area">
            <div id="canvas-container"></div>
            <button id="downloadBtn" class="btn-generate">Gerar e Baixar Meme</button>
        </main>

        <!-- SIDEBAR DIREITO: CONTROLES -->
        <aside class="sidebar-right">
            <h2>Controles</h2>

            <div class="control-section">
                <label>Texto Superior</label>
                <input type="text" id="topText" placeholder="Digite aqui" maxlength="50">
            </div>

            <div class="control-section">
                <label>Texto Inferior</label>
                <input type="text" id="bottomText" placeholder="Digite aqui" maxlength="50">
            </div>

            <div class="control-row">
                <div class="control-section flex-1">
                    <label>Cor</label>
                    <input type="color" id="textColor" value="#ffffff">
                </div>
                <div class="control-section flex-1">
                    <label>Tamanho</label>
                    <input type="range" id="textSize" min="15" max="80" value="40">
                </div>
            </div>

            <div class="control-section">
                <label>Fonte</label>
                <select id="fontFamily">
                    <option value="Impact">Impact</option>
                    <option value="Arial">Arial</option>
                    <option value="Georgia">Georgia</option>
                    <option value="Courier New">Courier New</option>
                </select>
            </div>

            <button id="resetBtn" class="btn-reset">Limpar Tudo</button>

            <hr>

            <h3>Meus Memes</h3>
            <button id="saveMemeBtn" class="btn-save">Salvar Meme</button>
            <ul id="memeList" class="meme-list"></ul>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
